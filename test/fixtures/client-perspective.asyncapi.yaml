asyncapi: 3.0.0
info:
  title: Test Client Perspective
  version: 1.0.0
  description: |
    Spec written from the CLIENT perspective (non-standard AsyncAPI v3).
    Here action: send means the client sends, action: receive means the client receives.
    Used to test the perspective=client parameter.

servers:
  local:
    host: localhost:9000
    protocol: ws
    description: Local test server

channels:
  main:
    address: /
    messages:
      ping:
        $ref: "#/components/messages/Ping"
      pong:
        $ref: "#/components/messages/Pong"
      echo:
        $ref: "#/components/messages/Echo"
      echoReply:
        $ref: "#/components/messages/EchoReply"

operations:
  clientSend:
    action: send
    channel:
      $ref: "#/channels/main"
    messages:
      - $ref: "#/channels/main/messages/ping"
      - $ref: "#/channels/main/messages/echo"

  clientReceive:
    action: receive
    channel:
      $ref: "#/channels/main"
    messages:
      - $ref: "#/channels/main/messages/pong"
      - $ref: "#/channels/main/messages/echoReply"

components:
  messages:
    Ping:
      name: ping
      payload:
        type: object
        properties:
          type:
            type: string
            const: ping
        required:
          - type

    Pong:
      name: pong
      payload:
        type: object
        properties:
          type:
            type: string
            const: pong
          server_time:
            type: string
        required:
          - type
          - server_time

    Echo:
      name: echo
      payload:
        type: object
        properties:
          type:
            type: string
            const: echo
          message:
            type: string
        required:
          - type
          - message

    EchoReply:
      name: echo_reply
      payload:
        type: object
        properties:
          type:
            type: string
            const: echo_reply
          message:
            type: string
        required:
          - type
          - message
