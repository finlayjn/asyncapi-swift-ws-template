name: Tests

on:
  push:
    branches: [main]

jobs:
  test:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm ci
      - run: npm install -g @asyncapi/cli --force
      - run: mkdir -p $(npm root -g)/@asyncapi/cli/lib/utils/logs
      - run: npm test
